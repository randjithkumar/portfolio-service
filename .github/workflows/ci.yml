name: Portfolio Service CI

on:
  push:
    branches:
      - main
  #      - develop
  pull_request:
    branches:
      - main
  #      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: portfolio-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-test-and-package:
    name: Build, Test and Package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Validate Maven project
        run: ./mvnw --batch-mode --no-transfer-progress validate

      - name: Run tests and verify application
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload application JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-service-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14

  docker-build:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test-and-package

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true