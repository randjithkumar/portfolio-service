name: portfolio-platform

services:
  postgres:
    image: postgres:17.7
    restart: unless-stopped

    profiles:
      - dependencies

    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    volumes:
      - portfolio-postgres-data:/var/lib/postgresql/data

    networks:
      - portfolio-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    security_opt:
      - no-new-privileges:true

  kafka:
    image: apache/kafka:4.1.2
    restart: unless-stopped

    profiles:
      - kafka

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT

      KAFKA_LISTENERS: >
        INTERNAL://:29092,
        EXTERNAL://:9092,
        CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka:29092,
        EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"

    volumes:
      - portfolio-kafka-data:/var/lib/kafka/data

    networks:
      - portfolio-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

    security_opt:
      - no-new-privileges:true

  portfolio-service:
    build:
      context: .
      dockerfile: Dockerfile

    image: portfolio-service:${APP_IMAGE_TAG:-0.0.1}
    restart: unless-stopped

    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}

      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-10}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-2}

      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      FLYWAY_REPAIR_ENABLED: ${FLYWAY_REPAIR_ENABLED:-false}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-portfolio-audit-group}
      KAFKA_HEALTH_ENABLED: ${KAFKA_HEALTH_ENABLED:-false}

      OUTBOX_ENABLED: ${OUTBOX_ENABLED:-false}
      OUTBOX_POLL_DELAY_MS: ${OUTBOX_POLL_DELAY_MS:-2000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      OUTBOX_SEND_TIMEOUT_SECONDS: ${OUTBOX_SEND_TIMEOUT_SECONDS:-10}

      FMP_MARKET_DATA_BASE_URL: ${FMP_MARKET_DATA_BASE_URL:-https://financialmodelingprep.com}
      MARKET_DATA_API_KEY: ${MARKET_DATA_API_KEY:-}
      FMP_CONNECT_TIMEOUT: ${FMP_CONNECT_TIMEOUT:-3s}
      FMP_READ_TIMEOUT: ${FMP_READ_TIMEOUT:-5s}

      YAHOO_MARKET_DATA_BASE_URL: ${YAHOO_MARKET_DATA_BASE_URL:-https://query1.finance.yahoo.com}
      YAHOO_CONNECT_TIMEOUT: ${YAHOO_CONNECT_TIMEOUT:-3s}
      YAHOO_READ_TIMEOUT: ${YAHOO_READ_TIMEOUT:-5s}

      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError}

    ports:
      - "${SERVER_PORT:-8081}:${SERVER_PORT:-8081}"

    depends_on:
      postgres:
        condition: service_healthy
        required: true

      kafka:
        condition: service_healthy
        required: false

    networks:
      - portfolio-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:$${SERVER_PORT}/actuator/health/readiness >/dev/null 2>&1 || wget -qO- http://localhost:$${SERVER_PORT}/actuator/health >/dev/null 2>&1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

    security_opt:
      - no-new-privileges:true

networks:
  portfolio-network:
    driver: bridge

volumes:
  portfolio-postgres-data:
  portfolio-kafka-data: